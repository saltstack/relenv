name: Build and Release

on:
  workflow_dispatch:
    inputs:
      kind:
        required: false
        type: string
        default: dev

jobs:
  ci:
    name: CI
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    uses: ./.github/workflows/ci.yml
    if: contains('["dwoz", "twangboy", "dmurhpy18"]', github.actor)
    with:
      kind: "${{ inputs.kind }}"
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
